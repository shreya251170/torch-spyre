name: module-tests

on:
  # Run automatically on every merge to main
  push:
    branches: [main]
    paths-ignore:
      - tests/docs/**
  pull_request:
    branches: [main]
    paths-ignore:
      - tests/docs/**
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  checks: write

jobs:
  model-ops-tests:
    name: ${{ matrix.suite.name }}
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 720
    env:
      # The CI env var is very important.
      # GitHub actions automatically sets CI=true
      # which causes the pytest inductor tests to fail with AssertionError
      # due to a mix of fallbacks and decompositions.
      # Here we set it to an empty string (or we could also unset it).
      CI: ''
      CLONED_TORCH_SPYRE_DIR: /home/senuser/torch-spyre

    # ---------------------------------------------------------------------------
    # To add a new model ops test suite, append an entry here:
    #   - name: <human-readable label shown in the GHA UI>
    #     config: <filename inside tests/configs/model_ops_tests/>
    #
    # The JUnit XML report is automatically named after the config file, e.g.:
    #   granite_4.0_h_tiny_spyre.yaml  ->  granite_4.0_h_tiny_spyre.xml
    # ---------------------------------------------------------------------------
    strategy:
      fail-fast: false   # run all suites even if one fails
      matrix:
        suite:
          - name: Granite 3.3 8B Instruct
            config: granite_3_3_8b_instruct_spyre.yaml

    steps:
      - name: Checkout torch-spyre repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: torch-spyre

      # ---------------------------------------------------------------------------
      # Derive the PyTorch release branch from pyproject.toml so there is a
      # single source of truth — no hardcoded version in this workflow.
      #
      # pyproject.toml declares:  torch~=2.11.0
      # This step extracts "2.11.0", strips the patch -> "2.11", and builds
      # the branch name "release/2.11".
      # ---------------------------------------------------------------------------
      - name: Derive PyTorch release branch from pyproject.toml
        id: pytorch-branch
        working-directory: torch-spyre
        run: |
          VERSION=$(python3 - <<'PYEOF'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          requires = data.get('build-system', {}).get('requires', [])
          torch_dep = next(x for x in requires if x.startswith('torch'))
          version = torch_dep.removeprefix('torch~=')   # e.g. "2.11.0"
          print('.'.join(version.split('.')[:2]))        # --> "2.11"
          PYEOF
          )
          BRANCH="release/${VERSION}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Derived PyTorch branch: $BRANCH"

      # ---------------------------------------------------------------------------
      # PyTorch source caching
      #
      # Cloning pytorch/pytorch with all submodules is expensive.
      # We cache the entire checkout keyed on the latest commit SHA of the branch
      # so the clone only happens when the branch actually updates upstream.
      #
      # Cache hit  --> restore from cache, skip checkout (saves several minutes)
      # Cache miss --> full clone + submodules, then save to cache for next run
      # ---------------------------------------------------------------------------
      - name: Get latest commit SHA of PyTorch branch
        id: pytorch-sha
        run: |
          BRANCH="${{ steps.pytorch-branch.outputs.branch }}"
          SHA=$(git ls-remote https://github.com/pytorch/pytorch.git "refs/heads/${BRANCH}" | cut -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "PyTorch ${BRANCH} HEAD: $SHA"

      - name: Restore PyTorch source from cache
        id: pytorch-cache
        uses: actions/cache@v4
        with:
          path: pytorch
          key: pytorch-${{ steps.pytorch-branch.outputs.branch }}-${{ steps.pytorch-sha.outputs.sha }}

      - name: Checkout PyTorch source
        if: steps.pytorch-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: pytorch/pytorch
          ref: ${{ steps.pytorch-branch.outputs.branch }}
          submodules: recursive
          path: pytorch

      - name: Set TORCH_ROOT
        run: echo "TORCH_ROOT=$GITHUB_WORKSPACE/pytorch" >> "$GITHUB_ENV"

      - name: Gather environment info
        run: |
          echo 'gather info start'
          pwd
          ls -la
          whoami
          id
          echo "GHA_RUNNER_POD_NODE_NAME $GHA_RUNNER_POD_NODE_NAME"
          echo "PATH $PATH"
          echo "HOME $HOME"
          echo "TORCH_ROOT $TORCH_ROOT"
          python3 --version
          python3 -c 'import sys; print(sys.path)'
          echo 'gather info end'

      - name: Install torch-spyre package and dependencies
        working-directory: torch-spyre
        run: |
          echo 'installing with dependencies, this could take a while...'
          pip install uv
          uv sync --all-extras --active --inexact --reinstall-package torch-spyre -v
          echo "VENV_PATH=${GITHUB_WORKSPACE}/torch-spyre/.venv" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.suite.name }} model ops test suite
        working-directory: torch-spyre/tests
        run: |
          # Derive the XML report name from the config filename
          # Example:
          #   granite_3.3_8b_instruct_spyre.yaml  ->  granite_3.3_8b_instruct_spyre.xml

          source "${VENV_PATH}/bin/activate"
          CONFIG="${{ matrix.suite.config }}"
          REPORT_NAME="${CONFIG%.yaml}.xml"
          REPORT_PATH="${GITHUB_WORKSPACE}/${REPORT_NAME}"

          echo "Running ${{ matrix.suite.name }} model ops tests..."
          bash run_test.sh configs/module_tests/${CONFIG} -v --junit-xml="${REPORT_PATH}"
          echo "${{ matrix.suite.name }} module tests done"

          # Expose report path/name to subsequent steps via GITHUB_ENV
          echo "REPORT_PATH=${REPORT_PATH}" >> "$GITHUB_ENV"
          echo "REPORT_NAME=${REPORT_NAME}" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------------------
      # Upload the JUnit XML as a GHA artifact so it can be downloaded and
      # ingested by the Spyre dashboard.
      #
      # if: always() ensures the report is uploaded even when tests fail —
      # a failed run is exactly when you most want the dashboard to show results.
      #
      # Artifact name matches the report filename so multiple matrix jobs don't
      # overwrite each other (each config produces a distinct name).
      # ---------------------------------------------------------------------------
      - name: Upload JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_NAME }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: warn   # warn (not fail) if pytest itself crashed
          retention-days: 10
