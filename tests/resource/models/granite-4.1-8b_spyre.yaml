            sample_inputs_func:
              args:
              - tensor:
                  shape: [1, 11]
                  stride: [11, 1]
                  storage_offset: 0
                  dtype: torch.int64
                  device: cpu
                  init: randint
                  init_args:
                    high: 1000
              - tensor:
                  shape: [100352, 4096]
                  stride: [4096, 1]
                  storage_offset: 0
                  dtype: torch.float16
                  device: cpu
                  init: rand
              - value: 100256
              - value: null
              - value: 2.0
              - value: false
              - value: false
            description: 'https://github.com/huggingface/transformers/blob/v5.2.0/src/transformers/models/granite/modeling_granite.py#L437
              in forward, code: inputs_embeds = self.embed_tokens(input_ids)'
