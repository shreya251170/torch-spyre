        atol: 0.005
        rtol: 0.005
    - name: bfloat16
      precision:
        atol: 0.005
        rtol: 0.005
    - name: float32
      precision:
        atol: 0.005
        rtol: 0.005
    - name: int16
      precision:
        atol: 0.005
        rtol: 0.005
    - name: int32
      precision:
        atol: 0.005
        rtol: 0.005
    input_config:
      seed: 123
  files:
